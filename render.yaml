services:
  - type: web
    name: puckstats-api
    env: docker
    dockerfilePath: backend/Dockerfile
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: puckstats-db
          property: connectionString
      - key: ConnectionStrings__Redis
        value: ""
      - key: ReplayStoragePath
        value: /data/replays

databases:
  - name: puckstats-db
    databaseName: puckstats
    plan: free
    region: oregon
    postgresMajorVersion: 16
